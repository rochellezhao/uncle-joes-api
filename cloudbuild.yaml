steps:
  # 1. Build & Push
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/uncle-joes-api:$COMMIT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/uncle-joes-api:$COMMIT_SHA']

  # 2. Deploy (The "Update" step)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'uncle-joes-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/uncle-joes-api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

  # 3. THE MAGIC STEP: Flip the switch to 100%
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'uncle-joes-api'
      - '--to-latest'
      - '--region'
      - 'us-central1'