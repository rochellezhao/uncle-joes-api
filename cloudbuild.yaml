steps:
  # 1. Build the container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/uncle-joes-api:$COMMIT_SHA', '.']

  # 2. Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/uncle-joes-api:$COMMIT_SHA']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'uncle-joes-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/uncle-joes-api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'

  # 4. FORCE TRAFFIC TO 100% (The automation fix)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'uncle-joes-api'
      - '--to-latest'
      - '--region'
      - 'us-central1'

images:
  - 'gcr.io/$PROJECT_ID/uncle-joes-api:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
